avoid-breaking-exported-api = true
# clippy.toml `msrv` is the API-suggestion floor: clippy won't suggest
# rewrites to APIs stabilized after this version. We keep this at 1.85
# even though the workspace Cargo.toml `rust-version` is 1.88 — the
# 1.88 bump was forced by aws-sdk-kms transitive deps (OGE-460), not
# by code wanting newer APIs. Keeping clippy's suggestion floor at 1.85
# preserves the option to drop the workspace MSRV again later if the
# transitive deps relax. A soft "MSRV differs" warning is expected.
msrv = "1.85"
cognitive-complexity-threshold = 30
too-many-arguments-threshold = 8
type-complexity-threshold = 250
disallowed-methods = [
    { path = "std::time::SystemTime::now", reason = "audit log time anchoring goes through ogentic_audit_core::time::now() to capture monotonic + session_id alongside wall-clock" },
]
