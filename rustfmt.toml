edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
match_block_trailing_comma = true
use_field_init_shorthand = true
use_try_shorthand = true

# `trailing_comma = "Vertical"` and `trailing_semicolon = true` were
# previously listed but are nightly-only and silently ignored on
# stable. Removed to keep CI logs clean. Reconsider once Rust nightly
# is wired into a separate matrix entry, or these options stabilize.
