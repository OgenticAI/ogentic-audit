# Release orchestrator (OGE-445 / D3).
#
# Triggered by `v*` tag push. Runs `cargo publish` for the three
# Rust crates in dependency order. The Python wheels + CLI binaries
# pipelines (wheels.yml / release-cli.yml) trigger on the same tag
# and run independently — PyPI + crates.io + GitHub Release are
# independent registries so order doesn't matter.
#
# Single tag → three fan-outs:
#
#   wheels.yml        →  PyPI publish (Trusted Publishers)
#   release-cli.yml   →  GitHub Release with signed CLI binaries
#   release.yml       →  cargo publish to crates.io  (this file)
#
# Required secrets (one-time, on repo Settings → Secrets):
#   CARGO_REGISTRY_TOKEN  crates.io publish token

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-crates:
    name: cargo publish (crates.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-crates

      # Publish in dependency order. ogentic-audit-core has no
      # internal deps; keychain + cli both depend on core.
      #
      # `cargo publish` blocks until crates.io's index updates the
      # crate listing — typically ~30 seconds. We add a sleep
      # between publishes to let the previous crate's metadata land
      # in the index before the next crate tries to resolve it.

      - name: publish ogentic-audit-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --package ogentic-audit-core --locked
          sleep 30  # give the crates.io index time to propagate

      - name: publish ogentic-audit-keychain
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --package ogentic-audit-keychain --locked
          sleep 30

      - name: publish ogentic-audit
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --package ogentic-audit --locked

  # ----------------------------------------------------------------
  # Update the README badge to point at the released version. Runs
  # AFTER cargo publish so we don't bump the badge before the
  # crates exist on crates.io.
  # ----------------------------------------------------------------
  update-badges:
    name: README badges → released version
    needs: publish-crates
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update README badge
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i \
            -e "s|on--disk%20format-v0.1-informational|on--disk%20format-v0.1-blueviolet|" \
            -e "s|\[\!\[Format v0.1\](https://img.shields.io/badge/on--disk%20format-v0.1|[![Format v0.1](https://img.shields.io/badge/on--disk%20format-v${VERSION}|" \
            README.md || true

      - name: Open PR with badge bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet README.md; then
            echo "no README changes to commit"
            exit 0
          fi
          BRANCH="release/post-${{ steps.ver.outputs.version }}-badge-bump"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add README.md
          git commit -m "chore(release): bump README badge for v${{ steps.ver.outputs.version }}"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): bump README badge for v${{ steps.ver.outputs.version }}" \
            --body "Auto-generated by release.yml after publishing v${{ steps.ver.outputs.version }} to crates.io."
